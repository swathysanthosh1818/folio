name: Auto-Update Portfolio Projects

on:
  # Runs whenever you push to ANY of your repos
  push:
    branches: ["main", "master"]

  # Also runs on a daily schedule at midnight IST
  schedule:
    - cron: "30 18 * * *"  # 18:30 UTC = midnight IST

  # Manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  update-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout portfolio repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🔍 Fetch GitHub repos & generate projects.json
        env:
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          GITHUB_TOKEN:    ${{ secrets.GH_TOKEN }}
        run: python fetch_repos.py

      - name: 📝 Commit & push projects.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects.json
          git diff --staged --quiet || git commit -m "🤖 Auto-update projects.json [$(date +'%Y-%m-%d')]"
          git push
